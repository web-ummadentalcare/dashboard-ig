name: Daily Instagram Scrape

on:
  schedule:
    # 05:00 WIB every day (WIB = UTC+7, so 22:00 UTC the day before)
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          IG_USERNAME: ummadentalcare
          RESULTS_LIMIT: "50"
        run: python scripts/scrape.py

      - name: Commit updated data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ummadentalcare.json
          if git diff --staged --quiet; then
            echo "No data changes today."
          else
            git commit -m "chore: daily scrape update $(date -u +%Y-%m-%d)"
            git push
          fi
